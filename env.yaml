name: camera-env
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - git
  - ninja
  - cmake
  - numpy=1.26
  - pillow
  - matplotlib
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.8.0+cu128
      - torchvision==0.23.0+cu128
      - torchaudio==2.8.0+cu128
      - opencv-python
      - ultralytics
      - git+https://github.com/facebookresearch/sam2.git